<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGLang Trace Viewer - Redirecting to Perfetto UI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        a { color: #64b5f6; }
        .error { color: #ef5350; }
    </style>
</head>
<body>
    <div class="container">
        <h2>SGLang Trace Viewer</h2>
        <p id="status">Redirecting to Perfetto UI...</p>
    </div>
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var src = params.get('src');
            if (!src) {
                document.getElementById('status').innerHTML =
                    '<span class="error">No trace URL provided.</span><br>' +
                    'Usage: <code>?src=&lt;trace_file_url&gt;</code>';
                return;
            }
            var perfettoUrl = 'https://ui.perfetto.dev/#!/?url=' + encodeURIComponent(src);
            window.location.replace(perfettoUrl);
        })();
    </script>
</body>
</html>
